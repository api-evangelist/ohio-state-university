reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      Ohio State University has no centralized public developer portal. The
      strongest confirmed public APIs come from University Libraries' Knowledge
      Bank: a live DSpace 7.6 REST API and a live OAI-PMH 2.0 endpoint, both
      verified returning real metadata. An institution-wide Shibboleth SAML 2.0
      Web Single Sign-On service is documented but gated to registered campus
      services. The enterprise Data Catalog is powered by data.world and gated
      to Ohio State affiliates with no public open-data API. No fabricated
      endpoints; only URLs that resolved are listed below.
    endpoints:
      - url: https://kb.osu.edu/server/api
        status: 200
        note: DSpace 7.6 REST API root, returns JSON HAL with repository links.
      - url: https://kb.osu.edu/server/oai/request?verb=Identify
        status: 200
        note: OAI-PMH 2.0 Identify verb, repository "The Knowledge Bank".
      - url: https://library.osu.edu/kb
        status: 200
        note: Knowledge Bank human-facing landing/documentation page.
      - url: https://cybersecurity.osu.edu/services/web-single-sign
        status: 200
        note: Web SSO service docs; SAML 2.0 via Shibboleth, InCommon member.
      - url: https://github.com/osulibraries
